<script>
// Arrow label renderer, white text with dark pill background for maximum readability
function arrowLabel(lx, ly, text, color) {
  const approxW = text.length * 5.2 + 14;
  const h = 15;
  return `
    <rect x="${lx - approxW/2}" y="${ly - h + 3}" width="${approxW}" height="${h}" rx="4" fill="#080810cc"/>
    <text x="${lx}" y="${ly}" text-anchor="middle" font-size="9" font-weight="bold"
      fill="#ffffff" font-family="Rajdhani,Segoe UI,sans-serif" letter-spacing="0.3">${text}</text>`;
}

const PHASES = [
  {
    label: "Normal login, safe query with real credentials",
    arrows:[
      // Attacker -> Web App (going up-right)
      {x1:106,y1:148,x2:204,y2:76,color:"#44aaff",marker:"arrB",label:"user + password",lx:142,ly:102},
      // Web App -> DB (going right)
      {x1:316,y1:66,x2:414,y2:148,color:"#44aaff",marker:"arrB",label:"SELECT WHERE user=? pass=?",lx:380,ly:100},
      // DB -> Web App (return, going left)
      {x1:414,y1:158,x2:316,y2:80,color:"#44ff88",marker:"arrG",label:"1 row matched",lx:350,ly:126},
      // Web App -> Attacker (return)
      {x1:204,y1:84,x2:106,y2:158,color:"#44ff88",marker:"arrG",label:"Login OK",lx:140,ly:130},
    ],
    showPayload:false,showExposed:false,showWarning:false,
    webStroke:"#44aaff",dbStroke:"#44ff88",userStroke:"#44aaff",
    showPrevention:false,
    phaseDuration:4500,
    info:{
      color:"#44ff88",
      svgIcon:`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" fill="#003300" stroke="#44ff88" stroke-width="1.3"/><path d="M6.5 10 L9 12.5 L13.5 7.5" stroke="#44ff88" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      title:"NORMAL LOGIN  SAFE",
      body:"User enters a <b>valid username and password</b>. The web app builds a SQL query using the input and sends it to the database. DB checks the credentials, returns <b>1 matched row</b>, and login succeeds. Everything works as intended."
    }
  },
  {
    label: "Attacker injects malicious SQL into the password field",
    arrows:[
      // Attacker -> Web App with payload
      {x1:106,y1:144,x2:204,y2:70,color:"#ff4444",marker:"arrR",label:"' OR '1'='1' --",lx:142,ly:98},
      // Web App -> DB (poisoned)
      {x1:316,y1:62,x2:414,y2:140,color:"#ff4444",marker:"arrR",label:"Unsanitized payload to DB",lx:382,ly:94},
    ],
    showPayload:true,showExposed:false,showWarning:true,
    webStroke:"#ff4444",dbStroke:"#ffaa44",userStroke:"#ff8844",
    showPrevention:false,
    phaseDuration:4800,
    info:{
      color:"#ff4444",
      svgIcon:`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2 L11.5 7.5 L17 7.5 L12.5 11 L14 17 L10 13.5 L6 17 L7.5 11 L3 7.5 L8.5 7.5 Z" fill="#2a0808" stroke="#ff4444" stroke-width="1.2" stroke-linejoin="round"/><circle cx="10" cy="9" r="1.5" fill="#ff4444"/></svg>`,
      title:"SQL INJECTION PAYLOAD",
      body:"Attacker types <b>' OR '1'='1'</b> as the password. The app concatenates this directly into the query without sanitization. The query becomes: <b>SELECT WHERE pass='' OR '1'='1'</b> which is always TRUE, bypassing authentication entirely."
    }
  },
  {
    label: "Database bypassed, attacker gets full unauthorized access",
    arrows:[
      // Attacker -> Web App
      {x1:106,y1:148,x2:204,y2:76,color:"#ff4444",marker:"arrR",label:"Injected query sent",lx:142,ly:102},

      {x1:414,y1:158,x2:316,y2:82,color:"#ff4444",marker:"arrR",label:"Full DB dump",lx:350,ly:128},
      // Web App -> Attacker
      {x1:204,y1:86,x2:106,y2:158,color:"#ff4444",marker:"arrR",label:"Admin access granted",lx:140,ly:130},

      svgIcon:`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2 L17 5 L17 10 Q17 16 10 19 Q3 16 3 10 L3 5 Z" fill="#2a0808" stroke="#ff4444" stroke-width="1.3"/><path d="M8 8 L12 12 M12 8 L8 12" stroke="#ff4444" stroke-width="1.6" stroke-linecap="round"/></svg>`,

];

let animInterval = null;
let autoTimer = null;
let currentPhase = 0;

function getButtonCenter(btnId) {
  const btn = document.getElementById(btnId);
  const rect = btn.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function animateCursorToButton(targetBtnId, callback) {
  const cursor = document.getElementById("autoCursor");
  const ring = document.getElementById("clickRing");
  const dot = document.getElementById("clickDot");
  const target = getButtonCenter(targetBtnId);
  const svgEl = document.getElementById("diagram");
  const svgRect = svgEl.getBoundingClientRect();
  const startX = svgRect.left + svgRect.width * 0.5;
  const startY = svgRect.top + svgRect.height * 0.55;

  cursor.style.display = "block";
  cursor.style.left = startX + "px";
  cursor.style.top = startY + "px";
  cursor.style.transition = "none";
  cursor.style.opacity = "0";
  ring.style.display = "none";
  dot.style.display = "none";

  setTimeout(() => {
    cursor.style.transition = "left 0.7s cubic-bezier(0.4,0,0.2,1), top 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.2s";
    cursor.style.opacity = "1";
    cursor.style.left = target.x + "px";
    cursor.style.top = target.y + "px";
  }, 60);

  setTimeout(() => {
    ring.style.display = "block";
    ring.style.animation = "none";
    dot.style.display = "block";
    dot.style.animation = "none";
    void ring.offsetWidth;
    ring.style.animation = "clickRing 0.4s ease-out forwards";
    dot.style.animation = "clickDot 0.4s ease-out forwards";
    setTimeout(() => {
      cursor.style.opacity = "0";
      setTimeout(() => {
        cursor.style.display = "none";
        ring.style.display = "none";
        dot.style.display = "none";
        if(callback) callback();
      }, 300);
    }, 350);
  }, 820);
}

function scheduleAutoAdvance(phaseIndex, duration) {
  if(autoTimer) clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    const nextPhase = (phaseIndex + 1) % 3;
    animateCursorToButton("btn" + nextPhase, () => { setPhase(nextPhase); });
  }, duration);
}

function setPhase(i) {
  currentPhase = i;
  const p = PHASES[i];

  [0,1,2].forEach(j => {
    const b = document.getElementById("btn"+j);
    b.classList.remove("active");
    if(j===i) b.classList.add("active");
  });

  document.getElementById("payloadLabel").style.display = p.showPayload ? "" : "none";
  document.getElementById("dbExposed").style.display = p.showExposed ? "" : "none";
  document.getElementById("warningBadge").style.display = p.showWarning ? "" : "none";
  document.getElementById("webAppRect").setAttribute("stroke", p.webStroke);
  document.getElementById("userRect").setAttribute("stroke", p.userStroke);
  document.getElementById("dbRect").setAttribute("stroke", p.showExposed ? "#1a0505" : p.dbStroke);
  document.getElementById("svgPhaseLabel").textContent = p.label;

  // Draw arrows + labels
  const ag = document.getElementById("arrowsGroup");
  ag.innerHTML = "";
  p.arrows.forEach(a => {
    ag.innerHTML += `
      <line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}"
        stroke="${a.color}" stroke-width="2"
        marker-end="url(#${a.marker})"/>
      ${arrowLabel(a.lx, a.ly, a.label, a.color)}`;
  });

  // Packet animation
  if(animInterval) clearInterval(animInterval);
  const pg = document.getElementById("packetsGroup");
  pg.innerHTML = "";
  const pState = p.arrows.map((a, idx) => ({...a, prog: -idx * 0.35}));
  animInterval = setInterval(() => {
    pg.innerHTML = "";
    pState.forEach(a => {
      a.prog += 0.015;
      if(a.prog > 1.3) a.prog = -0.3;
      if(a.prog < 0 || a.prog > 1) return;
      const t = Math.max(0, Math.min(1, a.prog));
      const x = a.x1 + (a.x2 - a.x1) * t;
      const y = a.y1 + (a.y2 - a.y1) * t;
      const op = t < 0.1 ? t/0.1 : t > 0.85 ? (1-t)/0.15 : 1;
      pg.innerHTML += `
        <rect x="${x-16}" y="${y-8}" width="32" height="16" rx="4"
          fill="${a.color}" opacity="${op*0.92}"/>
        <text x="${x}" y="${y+5}" text-anchor="middle" font-size="7"
          fill="#000" font-weight="bold" font-family="Rajdhani,sans-serif" letter-spacing="0.5">PKT</text>`;
    });
  }, 40);

  const inf = p.info;
  document.getElementById("infoCard").innerHTML = inf ? `
    <div class="info-card" style="background:#0e0e16;border:1px solid ${inf.color}28;border-left:3px solid ${inf.color};">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
        ${inf.svgIcon}
        <span style="color:#ffffff;font-size:11px;font-weight:bold;letter-spacing:1.5px;font-family:'Rajdhani','Inter',sans-serif;">${inf.title}</span>
      </div>
      <div style="color:#ffffff;font-size:11px;line-height:1.7;">${inf.body}</div>
    </div>` : "";

  document.getElementById("preventionCard").style.display = p.showPrevention ? "" : "none";
  scheduleAutoAdvance(i, p.phaseDuration);
}

setPhase(0);
</script>

<script>
(function(){
  function sendHeight(){
    var h = Math.ceil(document.body.offsetHeight) + 40;
    window.parent.postMessage({type:'acx-diagram-height', height:h}, '*');
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
  if (window.ResizeObserver) { new ResizeObserver(sendHeight).observe(document.body); }
  setTimeout(sendHeight, 50);
  setTimeout(sendHeight, 300);
  setTimeout(sendHeight, 1000);
})();
</script>
