<script>
const PHASES = [
  {
    label:"Normal DNS resolution, safe flow",
    arrows:[
      {x1:101,y1:138,x2:193,y2:72,color:"#44aaff",marker:"arrB",label:"Who is bank.com?",lx:132,ly:96},
      {x1:193,y1:78,x2:101,y2:144,color:"#44ff88",marker:"arrG",label:"IP: 93.184.1.1",lx:118,ly:123},
      {x1:102,y1:148,x2:378,y2:148,color:"#44ff88",marker:"arrG",label:"Connect to real bank.com",lx:224,ly:140},
    ],
    showAttacker:false,showFake:false,
    dnsStroke:"#44ff88",realStroke:"#44ff88",victimStroke:"#44aaff",
    showPrevention:false,
    phaseDuration:4000,
    info:{
      color:"#44ff88",bg:"#002a1a",border:"#44ff8833",
      svgIcon:`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" fill="#003300" stroke="#44ff88" stroke-width="1.3"/><path d="M6.5 10 L9 12.5 L13.5 7.5" stroke="#44ff88" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      title:"NORMAL DNS, SAFE",
      body:"Victim types <b>bank.com</b>. The DNS server looks up the domain and returns the <b>correct IP address</b>. Victim connects to the legitimate server. No attacker in sight, everything works as intended."
    }
  },
  {
    label:"Attacker poisons the DNS cache with forged responses",
    arrows:[
      {x1:240,y1:262,x2:240,y2:92,color:"#ff4444",marker:"arrR",label:"Forged reply: bank.com to evil IP",lx:306,ly:178},
      {x1:101,y1:128,x2:193,y2:58,color:"#44aaff",marker:"arrB",label:"Who is bank.com?",lx:128,ly:82},
      {x1:193,y1:68,x2:101,y2:132,color:"#ff4444",marker:"arrR",label:"IP: 10.0.0.1 (poisoned)",lx:108,ly:112},
    ],
    showAttacker:true,showFake:false,
    dnsStroke:"#ff4444",realStroke:"#44ff88",victimStroke:"#ff8844",
    showPrevention:false,
    phaseDuration:4500,
    info:{
      color:"#ff4444",bg:"#1a0505",border:"#ff444433",
      svgIcon:`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2 L11.5 7.5 L17 7.5 L12.5 11 L14 17 L10 13.5 L6 17 L7.5 11 L3 7.5 L8.5 7.5 Z" fill="#2a0808" stroke="#ff4444" stroke-width="1.2" stroke-linejoin="round"/><circle cx="10" cy="9" r="1.5" fill="#ff4444"/></svg>`,
      title:"CACHE POISONING ATTACK",
      body:"The attacker floods the DNS resolver with <b>thousands of forged replies</b> before the real server can respond. The DNS cache is <b>poisoned</b>. Every victim who asks for bank.com now gets the attacker's IP."
    }
  },
  {
    label:"Victim visits bank.com but lands on attacker's phishing site",
    arrows:[
      {x1:101,y1:132,x2:193,y2:66,color:"#44aaff",marker:"arrB",label:"Who is bank.com?",lx:128,ly:88},
      {x1:193,y1:76,x2:101,y2:142,color:"#ff4444",marker:"arrR",label:"IP: 10.0.0.1 poisoned cache",lx:108,ly:116},
      {x1:103,y1:148,x2:376,y2:148,color:"#ff4444",marker:"arrR",label:"Victim goes to FAKE SITE",lx:216,ly:140},
    ],
    showAttacker:true,showFake:true,
    dnsStroke:"#ff4444",realStroke:"#333",victimStroke:"#ff4444",
    showPrevention:true,
    phaseDuration:5000,
    info:null
  }
];

let animInterval = null;
let autoTimer = null;
let currentPhase = 0;

// ---- Auto cursor logic ----
function getButtonCenter(btnId) {
  const btn = document.getElementById(btnId);
  const rect = btn.getBoundingClientRect();
  return {
    x: rect.left + rect.width / 2,
    y: rect.top + rect.height / 2
  };
}

function animateCursorToButton(targetBtnId, callback) {
  const cursor = document.getElementById("autoCursor");
  const ring = document.getElementById("clickRing");
  const dot = document.getElementById("clickDot");

  const target = getButtonCenter(targetBtnId);
  // Start cursor from center-bottom of diagram area
  const svgEl = document.getElementById("diagram");
  const svgRect = svgEl.getBoundingClientRect();
  const startX = svgRect.left + svgRect.width * 0.5;
  const startY = svgRect.top + svgRect.height * 0.6;

  const dx = target.x - startX;
  const dy = target.y - startY;

  cursor.style.display = "block";
  cursor.style.left = startX + "px";
  cursor.style.top = startY + "px";
  cursor.style.transition = "none";
  cursor.style.opacity = "0";
  ring.style.display = "none";
  dot.style.display = "none";

  // Fade in
  setTimeout(() => {
    cursor.style.transition = "left 0.7s cubic-bezier(0.4,0,0.2,1), top 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.2s";
    cursor.style.opacity = "1";
    cursor.style.left = target.x + "px";
    cursor.style.top = target.y + "px";
  }, 60);

  // Click animation after move
  setTimeout(() => {
    ring.style.display = "block";
    ring.style.animation = "none";
    dot.style.display = "block";
    dot.style.animation = "none";
    void ring.offsetWidth;
    ring.style.animation = "clickRing 0.4s ease-out forwards";
    dot.style.animation = "clickDot 0.4s ease-out forwards";

    setTimeout(() => {
      cursor.style.opacity = "0";
      setTimeout(() => {
        cursor.style.display = "none";
        ring.style.display = "none";
        dot.style.display = "none";
        if(callback) callback();
      }, 300);
    }, 350);
  }, 820);
}

function scheduleAutoAdvance(phaseIndex, duration) {
  if(autoTimer) clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    const nextPhase = (phaseIndex + 1) % 3;
    const nextBtnId = "btn" + nextPhase;
    animateCursorToButton(nextBtnId, () => {
      setPhase(nextPhase);
    });
  }, duration);
}

// ---- Phase logic ----
function setPhase(i) {
  currentPhase = i;
  const p = PHASES[i];

  [0,1,2].forEach(j => {
    const b = document.getElementById("btn"+j);
    b.classList.remove("active");
    if(j===i) b.classList.add("active");
  });

  document.getElementById("attackerNode").style.display = p.showAttacker ? "" : "none";
  document.getElementById("fakeNode").style.display = p.showFake ? "" : "none";
  document.getElementById("realNode").style.display = p.showFake ? "none" : "";
  document.getElementById("dnsRect").setAttribute("stroke", p.dnsStroke);
  document.getElementById("victimRect").setAttribute("stroke", p.victimStroke);
  const rr = document.getElementById("realRect");
  if(rr) rr.setAttribute("stroke", p.realStroke);
  document.getElementById("svgPhaseLabel").textContent = p.label;

  // Arrows, no dashes
  const ag = document.getElementById("arrowsGroup");
  ag.innerHTML = "";
  p.arrows.forEach(a => {
    ag.innerHTML += `
      <line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}"
        stroke="${a.color}" stroke-width="1.5"
        marker-end="url(#${a.marker})"/>
      <text x="${a.lx}" y="${a.ly}" text-anchor="middle" font-size="7.5"
        fill="${a.color}" font-family="Segoe UI,sans-serif">${a.label}</text>`;
  });

  // Packet animation
  if(animInterval) clearInterval(animInterval);
  const pg = document.getElementById("packetsGroup");
  pg.innerHTML = "";
  const pState = p.arrows.map((a, idx) => ({...a, prog: -idx * 0.38}));
  animInterval = setInterval(() => {
    pg.innerHTML = "";
    pState.forEach(a => {
      a.prog += 0.016;
      const t = Math.max(0, Math.min(1, a.prog));
      if(a.prog < 0 || a.prog > 1.25) { if(a.prog > 1.25) a.prog = -0.25; return; }
      const x = a.x1 + (a.x2 - a.x1) * t;
      const y = a.y1 + (a.y2 - a.y1) * t;
      const op = t < 0.1 ? t/0.1 : t > 0.85 ? (1-t)/0.15 : 1;
      pg.innerHTML += `
        <rect x="${x-13}" y="${y-7}" width="26" height="14" rx="3"
          fill="${a.color}" opacity="${op*0.88}"/>
        <text x="${x}" y="${y+4}" text-anchor="middle" font-size="5.5"
          fill="#000" font-weight="bold" font-family="Segoe UI,sans-serif">PKT</text>`;
    });
  }, 40);

  // Info card
  const inf = p.info;
  document.getElementById("infoCard").innerHTML = inf ? `
    <div class="info-card" style="background:${inf.bg};border:1px solid ${inf.border};border-left:3px solid ${inf.color};">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
        ${inf.svgIcon}
        <span style="color:${inf.color};font-size:11px;font-weight:bold;letter-spacing:1.5px;font-family:'Rajdhani','Inter',sans-serif;">${inf.title}</span>
      </div>
      <div style="color:#bbb;font-size:11px;line-height:1.7;">${inf.body}</div>
    </div>` : "";

  document.getElementById("preventionCard").style.display = p.showPrevention ? "" : "none";

  // Schedule auto-advance
  scheduleAutoAdvance(i, p.phaseDuration);
}

setPhase(0);
</script>

<script>
