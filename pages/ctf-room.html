/* ── ROOM PAGE ── */
.room-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

/* Back bar */
.room-back { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; cursor: pointer; color: var(--text-dim); font-size: 12px; font-weight: 500; width: fit-content; transition: color 0.15s; }

/* Room hero */
.room-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 20px; display: flex; gap: 24px; flex-wrap: wrap; }
.room-hero-left { flex: 1; min-width: 260px; }
.room-category-badge { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--red); display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.room-category-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
.room-title { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--white); margin-bottom: 6px; line-height: 1.2; }
.room-tagline { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 16px; }
.room-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.room-tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
.room-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.room-join-btn { padding: 10px 24px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s; display: flex; align-items: center; gap: 8px; }
.room-join-btn:hover { background: #c01010; }
.room-join-btn.joined { background: transparent; border: 1px solid rgba(220,20,20,0.4); color: var(--red); }
.room-join-btn.joined:hover { background: var(--red-dim); }
.room-leave-btn { padding: 10px 16px; background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.room-leave-btn:hover { border-color: #f87171; color: #f87171; }

/* Room info sidebar */
.room-hero-right { width: 220px; flex-shrink: 0; }
.room-info-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.room-info-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
.room-info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px; }
.room-info-row:last-child { border-bottom: none; }
.room-info-key { color: var(--text-dim); }
.room-info-val { color: var(--white); font-weight: 500; text-align: right; max-width: 110px; }
.room-info-val.red   { color: var(--red); }
.room-info-val.green { color: #4ade80; }
.room-info-val.gold  { color: #fbbf24; }

/* Progress bar */
.room-progress-wrap { margin: 16px 0 0; }
.room-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
.room-progress-track { height: 6px; background: var(--surface); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.room-progress-fill { height: 100%; border-radius: 6px; background: var(--red); transition: width 0.5s; }
.room-progress-fill.complete { background: #4ade80; }

/* Tabs */
.room-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.room-tab { font-size: 13px; font-weight: 500; padding: 10px 20px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; font-family: 'Inter', sans-serif; background: none; border-left: none; border-right: none; border-top: none; display: flex; align-items: center; gap: 6px; }
.room-tab:hover { color: var(--white); }
.room-tab.active { color: var(--white); border-bottom-color: var(--red); }
.room-tab-count { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; color: var(--text-dim); }
.room-tab.active .room-tab-count { background: var(--red-dim); border-color: rgba(220,20,20,0.3); color: var(--red); }

/* Tab panels */
.room-panel { display: none; }
.room-panel.active { display: block; }

/* ── OVERVIEW TAB ── */
.room-about { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.room-about-title { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.room-about-body { font-size: 13px; color: var(--text-dim); line-height: 1.8; }
.room-about-body p { margin-bottom: 10px; }
.room-about-body strong { color: var(--white); }
.room-about-body code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: 'Courier New', monospace; font-size: 12px; color: #4ade80; }

/* Downloads section */
.room-downloads { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.room-dl-title { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 16px; }
.room-dl-grid { display: flex; flex-direction: column; gap: 10px; }
.room-dl-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; transition: border-color 0.15s; }
.room-dl-item:hover { border-color: rgba(220,20,20,0.3); }
.room-dl-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.room-dl-icon.pcap  { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); }
.room-dl-icon.pdf   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); }
.room-dl-icon.zip   { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); }
.room-dl-icon.link  { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); }
.room-dl-name { flex: 1; font-size: 13px; color: var(--white); font-weight: 500; }
.room-dl-size { font-size: 11px; color: var(--text-dim); }
.room-dl-btn { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 6px; background: var(--red-dim); border: 1px solid rgba(220,20,20,0.3); color: var(--red); cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
.room-dl-btn:hover { background: rgba(220,20,20,0.2); }

/* ── CHALLENGES TAB ── */
.room-challenge-list { display: flex; flex-direction: column; gap: 12px; }
.room-challenge-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
.room-challenge-item:hover { border-color: rgba(220,20,20,0.2); }
.room-challenge-item.completed { border-color: rgba(74,222,128,0.2); }
.room-challenge-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; }
.room-challenge-num { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text-dim); flex-shrink: 0; }
.room-challenge-item.completed .room-challenge-num { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.2); color: #4ade80; }
.room-challenge-meta { flex: 1; min-width: 0; }
.room-challenge-name { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
.room-challenge-sub { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.room-challenge-pts { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: #fbbf24; flex-shrink: 0; }
.room-challenge-status { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
.room-challenge-status.solved   { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
.room-challenge-status.unsolved { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.room-challenge-expand { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0; }
.room-challenge-item.open .room-challenge-expand { transform: rotate(180deg); }

.room-challenge-body { display: none; padding: 0 20px 20px; border-top: 1px solid rgba(255,255,255,0.04); }
.room-challenge-item.open .room-challenge-body { display: block; }
.room-challenge-desc { font-size: 13px; color: var(--text-dim); line-height: 1.7; margin: 14px 0; }
.room-hint-wrap { margin-bottom: 14px; }
.room-hint-toggle { font-size: 12px; color: var(--red); cursor: pointer; display: flex; align-items: center; gap: 6px; background: none; border: none; font-family: 'Inter', sans-serif; font-weight: 500; padding: 0; }
.room-hint-text { font-size: 12px; color: #fbbf24; background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.15); border-radius: 8px; padding: 10px 14px; margin-top: 8px; display: none; line-height: 1.6; }
.room-flag-area { display: flex; gap: 8px; }
.room-flag-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--white); font-size: 12px; font-family: 'Courier New', monospace; outline: none; transition: border-color 0.2s; }
.room-flag-input:focus { border-color: rgba(220,20,20,0.4); }
.room-flag-input::placeholder { color: var(--text-dim); font-family: 'Courier New', monospace; }
.room-flag-input:disabled { opacity: 0.5; cursor: not-allowed; }
.room-flag-submit { padding: 9px 20px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; transition: background 0.15s; }
.room-flag-submit:hover { background: #c01010; }
.room-flag-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.room-flag-msg { font-size: 12px; margin-top: 8px; min-height: 18px; }
.room-flag-msg.success { color: #4ade80; }
.room-flag-msg.error   { color: #f87171; }

/* Lab button */
.room-lab-btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.25); border-radius: 8px; color: #60a5fa; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; text-decoration: none; margin-top: 12px; }
.room-lab-btn:hover { background: rgba(96,165,250,0.18); border-color: rgba(96,165,250,0.4); }

/* ── LAB TAB ── */
.room-lab-frame-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.room-lab-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.room-lab-bar-title { font-size: 13px; font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 8px; }
.room-lab-status { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: room-pulse 2s infinite; }
@keyframes room-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.room-lab-actions { display: flex; gap: 8px; }
.room-lab-action-btn { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.room-lab-action-btn:hover { color: var(--white); border-color: var(--border-hover); }
.room-lab-iframe { width: 100%; height: 580px; border: none; background: #08080d; display: block; }

/* ── SCOREBOARD TAB ── */
.room-scoreboard { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.room-sb-head { display: grid; grid-template-columns: 48px 1fr 80px 80px 80px; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
.room-sb-row { display: grid; grid-template-columns: 48px 1fr 80px 80px 80px; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; font-size: 13px; transition: background 0.1s; }
.room-sb-row:last-child { border-bottom: none; }
.room-sb-row:hover { background: rgba(255,255,255,0.015); }
.room-sb-rank { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-dim); text-align: center; }
.room-sb-rank.gold   { color: #fbbf24; }
.room-sb-rank.silver { color: #94a3b8; }
.room-sb-rank.bronze { color: #fb923c; }
.room-sb-name { color: var(--white); font-weight: 500; }
.room-sb-solves, .room-sb-pts, .room-sb-time { color: var(--text-dim); font-size: 12px; text-align: center; }
.room-sb-pts { color: var(--red); font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; }

/* Responsive */
@media (max-width: 768px) {
  .room-wrap { padding: 20px 14px 48px; }
  .room-hero { flex-direction: column; padding: 20px; }
  .room-hero-right { width: 100%; }
  .room-title { font-size: 22px; }
  .room-actions { width: 100%; }
  .room-join-btn, .room-leave-btn { flex: 1; justify-content: center; }
  .room-tab { padding: 10px 12px; font-size: 12px; }
  .room-sb-head, .room-sb-row { grid-template-columns: 36px 1fr 60px 60px; }
  .room-sb-head > *:last-child, .room-sb-row > *:last-child { display: none; }
  .room-lab-iframe { height: 420px; }
  .room-flag-area { flex-direction: column; }
  .room-flag-submit { width: 100%; }
  .room-lab-bar { flex-wrap: wrap; gap: 8px; }
  .room-lab-actions { width: 100%; }
  .room-lab-action-btn { flex: 1; }
}
@media (max-width: 400px) {
  .room-sb-head, .room-sb-row { grid-template-columns: 30px 1fr 50px; }
  .room-sb-head > *:nth-last-child(2), .room-sb-row > *:nth-last-child(2) { display: none; }
  .room-challenge-header { padding: 12px 14px; gap: 10px; }
  .room-challenge-pts { font-size: 14px; }
  .room-lab-iframe { height: 340px; }
}
</style>

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
let _activeRoom       = null;
let _roomJoined       = false;
let _roomSolvedSet    = new Set();
let _roomChallenges   = [];
let _currentLabUrl    = '';

// ── Load room by ID ──
async function openCTFRoom(roomId) {
  _activeRoom = null;
  _roomJoined = false;
  _roomSolvedSet.clear();
  _roomChallenges = [];

  showPage('ctfroom');

  if (!_supabase) {
    document.getElementById('roomTitle').textContent = 'Supabase not connected';
    return;
  }

  // Load room data
  const { data: room, error } = await _supabase
    .from('ctf_rooms')
    .select('*')
    .eq('id', roomId)
    .single();

  if (error || !room) {
    document.getElementById('roomTitle').textContent = 'Room not found';
    return;
  }

  _activeRoom = room;
  renderRoomInfo(room);

  // Check if user joined
  if (window._currentUser) {
    const { data: join } = await _supabase
      .from('room_joins')
      .select('id')
      .eq('room_id', roomId)
      .eq('user_id', window._currentUser.id)
      .single();

    _roomJoined = !!join;
    updateJoinUI();

    // Load user solves for this room
    const { data: solves } = await _supabase
      .from('ctf_solves')
      .select('challenge_id')
      .eq('user_id', window._currentUser.id)
      .eq('correct', true);

    _roomSolvedSet = new Set((solves||[]).map(s => s.challenge_id));
  }

  // Load challenges
  const { data: challenges } = await _supabase
    .from('ctf_challenges')
    .select('*')
    .eq('room_id', roomId)
    .eq('status', 'active')
    .order('points', { ascending: true });

  _roomChallenges = challenges || [];
  document.getElementById('roomChallengeCount').textContent = _roomChallenges.length;

  updateProgress();

  // Load scoreboard
  loadRoomScoreboard(roomId);
}

function renderRoomInfo(room) {
  document.getElementById('roomCategory').textContent   = (room.category || 'CTF').toUpperCase();
  document.getElementById('roomTitle').textContent      = room.title || 'Untitled Room';
  document.getElementById('roomTagline').textContent    = room.tagline || '';
  document.getElementById('roomCreator').textContent    = room.created_by || 'AlexCyberX';
  document.getElementById('roomCreated').textContent    = room.created_at ? new Date(room.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
  document.getElementById('roomUpdated').textContent    = room.updated_at ? new Date(room.updated_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
  document.getElementById('roomDifficulty').textContent = room.difficulty ? room.difficulty.charAt(0).toUpperCase()+room.difficulty.slice(1) : '—';
  document.getElementById('roomPoints').textContent     = room.total_points ? room.total_points + ' pts' : '—';
  document.getElementById('roomTime').textContent       = room.estimated_time || '—';
  document.getElementById('roomJoinedCount').textContent = (room.joined_count || 0) + ' users';

  // Tags
  const tags = room.tags || [];
  document.getElementById('roomTags').innerHTML = tags.map(t =>
    `<span class="room-tag">${t}</span>`
  ).join('');

  // About
  document.getElementById('roomAboutBody').innerHTML = room.about_html || room.about || '<p>No description available.</p>';

  // Lab
  _currentLabUrl = room.lab_url || '';
  document.getElementById('roomLabTitle').textContent = (room.title || 'Lab') + ' — Practice Environment';

  // Downloads
  const downloads = room.downloads || [];
  const dlEl = document.getElementById('roomDownloadsList');
  if (!downloads.length) {
    document.getElementById('roomDownloadsSection').style.display = 'none';
  } else {
    dlEl.innerHTML = downloads.map(d => {
      const iconMap = { pcap:'blue', pdf:'red', zip:'yellow', link:'green' };
      const typeColor = iconMap[d.type] || 'link';
      return `
      <div class="room-dl-item">
        <div class="room-dl-icon ${typeColor}">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            ${d.type === 'link'
              ? '<path d="M6 10L10 6M8 4h4v4M10 10v3H3V7h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>'
              : '<path d="M8 1v9M5 7l3 3 3-3M2 13h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>'}
          </svg>
        </div>
        <div class="room-dl-name">${d.name}</div>
        ${d.size ? `<div class="room-dl-size">${d.size}</div>` : ''}
        <a href="${d.url}" target="_blank" class="room-dl-btn">${d.type === 'link' ? 'Open' : 'Download'}</a>
      </div>`;
    }).join('');
  }
}

function updateProgress() {
  const total   = _roomChallenges.length;
  const solved  = _roomChallenges.filter(c => _roomSolvedSet.has(c.id)).length;
  const pct     = total ? Math.round((solved/total)*100) : 0;
  document.getElementById('roomProgressPct').textContent = pct + '%';
  const bar = document.getElementById('roomProgressBar');
  bar.style.width = pct + '%';
  bar.className = 'room-progress-fill' + (pct >= 100 ? ' complete' : '');
}

function updateJoinUI() {
  const joinBtn  = document.getElementById('roomJoinBtn');
  const leaveBtn = document.getElementById('roomLeaveBtn');
  if (_roomJoined) {
    joinBtn.textContent = '✓ Joined';
    joinBtn.classList.add('joined');
    leaveBtn.style.display = '';
  } else {
    joinBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v6M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Join Room';
    joinBtn.classList.remove('joined');
    leaveBtn.style.display = 'none';
  }
}

async function toggleRoomJoin() {
  if (!window._currentUser) { showAuth('login'); return; }
  if (!_activeRoom) return;

  if (_roomJoined) return;

  const { error } = await _supabase.from('room_joins').insert({
    room_id: _activeRoom.id,
    user_id: window._currentUser.id,
    joined_at: new Date().toISOString()
  });

  if (!error) {
    _roomJoined = true;
    updateJoinUI();
    // Increment joined count
    await _supabase.from('ctf_rooms')
      .update({ joined_count: (_activeRoom.joined_count||0) + 1 })
      .eq('id', _activeRoom.id);
    _activeRoom.joined_count = (_activeRoom.joined_count||0) + 1;
    document.getElementById('roomJoinedCount').textContent = _activeRoom.joined_count + ' users';
    // Now show challenges
    renderChallenges();
  }
}

async function leaveRoom() {
  if (!window._currentUser || !_activeRoom) return;
  if (!confirm('Leave this room? Your progress will be saved.')) return;

  await _supabase.from('room_joins')
    .delete()
    .eq('room_id', _activeRoom.id)
    .eq('user_id', window._currentUser.id);

  _roomJoined = false;
  updateJoinUI();
  document.getElementById('roomChallengeList').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px;">Join the room to see challenges</div>';
}

// ── Tab switching ──
function switchRoomTab(tab, btn) {
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.room-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('roomPanel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

  if (tab === 'challenges') {
    if (_roomJoined) renderChallenges();
  }
  if (tab === 'lab') {
    loadLab();
  }
  if (tab === 'scoreboard') {
    if (_activeRoom) loadRoomScoreboard(_activeRoom.id);
  }
}

// ── Render Challenges ──
function renderChallenges() {
  const list = document.getElementById('roomChallengeList');
  if (!_roomChallenges.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No challenges yet in this room.</div>';
    return;
  }

  list.innerHTML = _roomChallenges.map((c, i) => {
    const solved = _roomSolvedSet.has(c.id);
    return `
    <div class="room-challenge-item ${solved ? 'completed' : ''}" id="rc_${c.id}">
      <div class="room-challenge-header" onclick="toggleRoomChallenge('${c.id}')">
        <div class="room-challenge-num">${solved ? '✓' : i+1}</div>
        <div class="room-challenge-meta">
          <div class="room-challenge-name">${c.title}</div>
          <div class="room-challenge-sub">
            <span>${c.category}</span>
            <span>·</span>
            <span class="ctf-diff-badge ${c.difficulty}">${c.difficulty}</span>
            <span>·</span>
            <span>${c.solve_count} solves</span>
          </div>
        </div>
        <div class="room-challenge-pts">${c.points} pts</div>
        <span class="room-challenge-status ${solved ? 'solved' : 'unsolved'}">${solved ? '✓ Solved' : 'Unsolved'}</span>
        <div class="room-challenge-expand">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="room-challenge-body">
        <div class="room-challenge-desc">${c.description || ''}</div>
        ${(c.hints||[]).map((h,hi) => `
          <div class="room-hint-wrap">
            <button class="room-hint-toggle" onclick="toggleRoomHint('rh_${c.id}_${hi}')">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 5.5V8M6 4v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              Hint ${hi+1}
            </button>
            <div class="room-hint-text" id="rh_${c.id}_${hi}">${h}</div>
          </div>
        `).join('')}
        ${c.lab_url ? `
          <a class="room-lab-btn" href="${c.lab_url}" target="_blank">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M3 1v4L1 9.5A1.2 1.2 0 002 11h9a1.2 1.2 0 001-1.5L10 5V1M3 1h7M2 6h9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Open Lab for this Challenge
          </a>
        ` : ''}
        ${solved ? `
          <div class="room-flag-msg success" style="margin-top:12px;">✓ You have solved this challenge!</div>
        ` : `
          <div class="room-flag-area" style="margin-top:12px;">
            <input type="text" class="room-flag-input" id="rf_${c.id}" placeholder="ACX{flag_here}" autocomplete="off"
              onkeydown="if(event.key==='Enter')submitRoomFlag('${c.id}')">
            <button class="room-flag-submit" onclick="submitRoomFlag('${c.id}')">Submit</button>
          </div>
          <div class="room-flag-msg" id="rfm_${c.id}"></div>
        `}
      </div>
    </div>`;
  }).join('');
}

function toggleRoomChallenge(id) {
  const el = document.getElementById('rc_' + id);
  if (!el) return;
  el.classList.toggle('open');
}

function toggleRoomHint(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

async function submitRoomFlag(challengeId) {
  if (!window._currentUser) { showAuth('login'); return; }

  const input = document.getElementById('rf_' + challengeId);
  const msgEl = document.getElementById('rfm_' + challengeId);
  const flag  = (input?.value || '').trim();

  if (!flag) { if(msgEl){msgEl.textContent='Enter the flag.';msgEl.className='room-flag-msg error';} return; }

  const c = _roomChallenges.find(x => x.id === challengeId);
  if (!c) return;

  // Get correct flag from DB
  const { data: ch } = await _supabase
    .from('ctf_challenges').select('flag').eq('id', challengeId).single();

  const correct = ch?.flag === flag;

  await _supabase.from('ctf_solves').upsert({
    user_id: window._currentUser.id, challenge_id: challengeId,
    flag_submitted: flag, correct, points_earned: correct ? c.points : 0,
    solved_at: new Date().toISOString()
  }, { onConflict: 'user_id,challenge_id' });

  if (correct) {
    _roomSolvedSet.add(challengeId);
    c.solve_count++;
    if(msgEl){msgEl.textContent='🎉 Correct! +'+c.points+' XP'; msgEl.className='room-flag-msg success';}
    if(input){input.disabled=true;}

    // XP
    await _supabase.rpc('add_xp',{
      p_user_id: window._currentUser.id, p_amount: c.points,
      p_reason: 'CTF Room: '+c.title, p_source: 'ctf'
    });

    updateProgress();
    // Refresh challenge item
    const item = document.getElementById('rc_'+challengeId);
    if(item){ item.classList.add('completed'); }
    const numEl = item?.querySelector('.room-challenge-num');
    if(numEl) numEl.textContent = '✓';
    const statusEl = item?.querySelector('.room-challenge-status');
    if(statusEl){ statusEl.textContent='✓ Solved'; statusEl.className='room-challenge-status solved'; }
  } else {
    if(msgEl){msgEl.textContent='✗ Wrong flag. Try again!'; msgEl.className='room-flag-msg error';}
    if(input){input.value='';}
  }
}

// ── Lab ──
function loadLab() {
  if (!_activeRoom) return;
  const frame = document.getElementById('roomLabFrame');
  if (!frame) return;
  if (_activeRoom.lab_url) {
    if (frame.src !== _activeRoom.lab_url) {
      frame.src = _activeRoom.lab_url;
    }
  } else {
    document.getElementById('roomLabContent').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:var(--text-dim);">
        <div style="font-size:40px;margin-bottom:16px;">🔬</div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--white);margin-bottom:8px;">Lab Coming Soon</div>
        <div style="font-size:13px;">The lab for this room is being prepared. Check back soon!</div>
      </div>`;
  }
}

function resetLab() {
  const frame = document.getElementById('roomLabFrame');
  if (frame && _activeRoom?.lab_url) {
    frame.src = _activeRoom.lab_url;
  }
}

function openLabFullscreen() {
  if (_activeRoom?.lab_url) {
    window.open(_activeRoom.lab_url, '_blank');
  }
}

// ── Scoreboard ──
async function loadRoomScoreboard(roomId) {
  if (!_supabase) return;
  const listEl = document.getElementById('roomScoreboardList');

  const { data } = await _supabase
    .from('ctf_solves')
    .select('user_id, challenge_id, points_earned, solved_at, profiles(full_name, email)')
    .eq('correct', true)
    .in('challenge_id', _roomChallenges.map(c => c.id));

  if (!data?.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-dim);font-size:13px;">No solvers yet. Be the first!</div>';
    return;
  }

  // Group by user
  const map = {};
  data.forEach(s => {
    const uid  = s.user_id;
    const name = s.profiles?.full_name || s.profiles?.email?.split('@')[0] || 'Unknown';
    if (!map[uid]) map[uid] = { name, solves: 0, points: 0, lastTime: s.solved_at };
    map[uid].solves++;
    map[uid].points += s.points_earned || 0;
    if (s.solved_at > map[uid].lastTime) map[uid].lastTime = s.solved_at;
  });

  const sorted = Object.values(map).sort((a,b) => b.points-a.points || a.lastTime.localeCompare(b.lastTime));

  listEl.innerHTML = sorted.map((u,i) => {
    const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const d = new Date(u.lastTime);
    const timeStr = d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    return `
    <div class="room-sb-row">
      <div class="room-sb-rank ${rankCls}">${i+1}</div>
      <div class="room-sb-name">${u.name}</div>
      <div class="room-sb-solves">${u.solves}</div>
      <div class="room-sb-pts">${u.points}</div>
      <div class="room-sb-time">${timeStr}</div>
    </div>`;
  }).join('');
}
</script>
