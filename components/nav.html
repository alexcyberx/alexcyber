<!-- ═══════════ MAIN NAV (always visible) ═══════════ -->
<nav id="mainNav">
  <button class="nav-logo" onclick="showPage('home')">
    <div class="logo-text"><strong>Alex <em>CyberX</em></strong></div>
  </button>

  <div class="nav-center" id="homeNavCenter">
    <button class="nav-link" onclick="showPage('home'); scrollToSection('home')">Home</button>
    <button class="nav-link" onclick="showPage('learn')">Tutorials</button>
    <button class="nav-link" onclick="showPage('tools')">Tools</button>
    <button class="nav-link" onclick="showPage('home'); scrollToSection('about')">About</button>
    <button class="nav-link" onclick="showPage('home'); scrollToSection('contact')">Contact</button>
  </div>

  <div class="nav-right" id="homeNavRight">
    <button class="nav-btn ghost" id="langNavBtn" onclick="showLangModal()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;" title="Change Language">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7" cy="7" r="6" stroke="#6a6a7a" stroke-width="1.2"/>
        <ellipse cx="7" cy="7" rx="2.8" ry="6" stroke="#6a6a7a" stroke-width="1.2"/>
        <line x1="1.2" y1="4.5" x2="12.8" y2="4.5" stroke="#6a6a7a" stroke-width="1.2"/>
        <line x1="1.2" y1="9.5" x2="12.8" y2="9.5" stroke="#6a6a7a" stroke-width="1.2"/>
      </svg>
      <span style="font-size:11px;letter-spacing:0.3px;" id="langNavLabel">Language</span>
    </button>
    <button class="nav-btn ghost" onclick="showAuth('login')" id="navLoginBtn" data-i18n="nav.login">Login</button>
    <button class="nav-btn fill" onclick="showAuth('signup')" id="navSignupBtn" data-i18n="nav.signup">Sign Up</button>
    <div class="nav-avatar" id="navAvatar" onclick="showAuth('profile')">
      <div class="nav-avatar-pic" id="navAvatarPic">A</div>
      <span class="nav-avatar-name" id="navAvatarName">User</span>
      <div class="nav-avatar-dropdown">
        <button class="nav-avatar-dropdown-item" onclick="event.stopPropagation();showPage('profile')">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4.5" r="2.5" stroke="#888" stroke-width="1.2"/><path d="M2 12c0-2.8 2.2-4 5-4s5 1.2 5 4" stroke="#888" stroke-width="1.2" stroke-linecap="round"/></svg>
          My Profile
        </button>
        <hr/>
        <button class="nav-avatar-dropdown-item danger" onclick="event.stopPropagation();doLogout()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 7h7M9 4.5L12 7l-3 2.5" stroke="#e06060" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 2H3a1 1 0 00-1 1v8a1 1 0 001 1h3" stroke="#e06060" stroke-width="1.2" stroke-linecap="round"/></svg>
          Sign Out
        </button>
      </div>
    </div>
  </div>

  <!-- Search icon — always visible next to hamburger -->
  <div class="nav-search-wrap" id="navSearchWrap">
    <button class="nav-search-icon-btn" id="navSearchToggle" onclick="toggleNavSearch()" title="Search">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="5" stroke="#6a6a7a" stroke-width="1.4"/>
        <path d="M10.5 10.5L13.5 13.5" stroke="#6a6a7a" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="nav-search-expanded" id="navSearchExpanded" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-left:10px;flex-shrink:0;">
        <circle cx="6" cy="6" r="4.5" stroke="#555" stroke-width="1.3"/>
        <path d="M9.5 9.5L12 12" stroke="#555" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input type="text" id="heroSearchInput" placeholder="Search courses, chapters..." autocomplete="off"
        oninput="runSearchFromNav(this.value)"
        onkeydown="handleSearchKey(event,'nav')" />
      <button id="searchClearBtn" onclick="clearNavSearch()" style="display:none;background:none;border:none;cursor:pointer;padding:0 10px;color:#555;">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="search-results-dropdown" id="searchResultsDropdown" style="display:none;"></div>
  </div>

  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ═══════════ LEARN SUB-NAV (CodeWithHarry style) ═══════════ -->
<div id="learnSubNav">
  <div class="lsn-left">
    <button class="lsn-toggle" id="sidebarToggle" onclick="toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="2.5" width="14" height="1.5" rx="1" fill="#888"/>
        <rect x="1" y="7.25" width="14" height="1.5" rx="1" fill="#888"/>
        <rect x="1" y="12" width="14" height="1.5" rx="1" fill="#888"/>
      </svg>
    </button>
    <div class="lsn-breadcrumb">
      <button onclick="showPage('home')">Tutorials</button>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="#333" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Network Forensics</span>
    </div>
  </div>
  <div class="lsn-right">
    <button id="lsnLangBtn" onclick="showLangModal()" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:5px 10px;border-radius:7px;background:transparent;border:1px solid rgba(255,255,255,0.07);color:#6a6a7a;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;" title="Change Language">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/><ellipse cx="6.5" cy="6.5" rx="2.6" ry="5.5" stroke="currentColor" stroke-width="1.2"/><line x1="1.2" y1="4.2" x2="11.8" y2="4.2" stroke="currentColor" stroke-width="1.1"/><line x1="1.2" y1="8.8" x2="11.8" y2="8.8" stroke="currentColor" stroke-width="1.1"/></svg>
      <span id="lsnLangLabel" data-i18n="nav.lang">Language</span>
    </button>
    <button class="nav-btn ghost" style="font-size:11px;padding:5px 12px;" onclick="showAuth('login')" id="lsnLoginBtn" data-i18n="nav.login">Login</button>
    <button class="nav-btn fill" style="font-size:11px;padding:5px 12px;" onclick="showAuth('signup')" id="lsnSignupBtn" data-i18n="nav.signup">Sign Up</button>
    <div class="nav-avatar" id="lsnAvatar" style="gap:8px;" onclick="showPage('profile')">
      <div class="nav-avatar-pic" id="lsnAvatarPic" style="width:28px;height:28px;font-size:12px;">A</div>
      <span class="nav-avatar-name" id="lsnAvatarName" style="font-size:12px;">User</span>
    </div>
  </div>
</div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <button class="m-nav" onclick="showPage('home'); toggleMenu()" data-i18n="nav.home">Home</button>
  <button class="m-nav" onclick="showPage('learn'); toggleMenu()" data-i18n="nav.tutorials">Tutorials</button>
  <button class="m-nav" onclick="showPage('tools'); toggleMenu()">Tools</button>
  <button class="m-nav" onclick="showPage('home'); scrollToSection('about'); toggleMenu()" data-i18n="nav.about">About</button>
  <button class="m-nav" onclick="showPage('home'); scrollToSection('contact'); toggleMenu()" data-i18n="nav.contact">Contact</button>
  <div class="m-divider"></div>
  <button class="m-nav" onclick="showLangModal();toggleMenu();" style="display:flex;align-items:center;gap:10px;">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7.5" cy="7.5" r="6.2" stroke="#6a6a7a" stroke-width="1.2"/>
      <ellipse cx="7.5" cy="7.5" rx="3" ry="6.2" stroke="#6a6a7a" stroke-width="1.2"/>
      <line x1="1.5" y1="5" x2="13.5" y2="5" stroke="#6a6a7a" stroke-width="1.2"/>
      <line x1="1.5" y1="10" x2="13.5" y2="10" stroke="#6a6a7a" stroke-width="1.2"/>
    </svg>
    <span id="mLangLabel" data-i18n="nav.lang">Select Language</span>
  </button>
  <div class="m-divider"></div>
  <div class="m-auth">
    <button class="ml" onclick="showAuth('login');toggleMenu()" data-i18n="nav.login">Login</button>
    <button class="ms" onclick="showAuth('signup');toggleMenu()" data-i18n="nav.signup">Sign Up</button>
  </div>
</div>
